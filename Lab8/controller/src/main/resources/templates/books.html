<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex align-items-center mb-3">
            <span class="me-3 fw-bold text-secondary" sec:authorize="isAuthenticated()">Xin chào, <span sec:authentication="name"></span></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-danger shadow-sm">Đăng xuất</button>
            </form>
        </div>

        <div class="d-flex justify-content-between mb-3">
            <a href="/books/add" class="btn btn-success">+ Thêm sản phẩm mới</a>
            <a href="/cart" class="btn btn-primary">Giỏ hàng</a>
        </div>

        <div class="card shadow mb-3">
            <div class="card-body">
                <form class="row g-2" method="get" th:action="@{/books}">
                    <div class="col-md-4">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo tên...">
                    </div>
                    <div class="col-md-3">
                        <select name="category" class="form-select">
                            <option value="">Tất cả thể loại</option>
                            <option th:each="c : ${categories}" th:value="${c}" th:text="${c}" th:selected="${c == selectedCategory}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="sort" class="form-select">
                            <option value="">Sắp xếp</option>
                            <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá tăng dần</option>
                            <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá giảm dần</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button class="btn btn-outline-primary">Tìm</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table class="table table-hover table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Tên sản phẩm</th>
                            <th>Hình ảnh</th>
                            <th>Giá</th>
                            <th>Thương hiệu</th>
                            <th>Chức năng</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}">
                            <td th:text="${book.id}"></td>
                            <td class="fw-bold" th:text="${book.title}"></td>
                            <td>
                                <img th:src="${book.image}" alt="Ảnh" style="width: 80px; height: 80px; object-fit: cover; border-radius:4px;">
                            </td>
                            <td class="text-danger fw-bold" th:text="${book.price} + ' VNĐ'"></td>
                            <td th:text="${book.author}"></td>
                            <td>
                                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-warning">Sửa</a>
                                <a th:href="@{/books/delete/{id}(id=${book.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                                <form th:action="@{/cart/add/{id}(id=${book.id})}" method="post" style="display:inline-block; margin-left:6px;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="number" name="quantity" value="1" min="1" style="width:70px; display:inline-block" class="form-control form-control-sm d-inline-block">
                                    <button class="btn btn-sm btn-success mt-1">Add</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span th:text="'Trang ' + (${currentPage} + 1) + ' / ' + ${totalPages}"></span>
                    </div>
                    <div>
                        <a th:classappend="${currentPage == 0} ? ' disabled' : ''" th:href="@{/books(page=${currentPage-1}, keyword=${keyword}, category=${selectedCategory}, sort=${sort})}" class="btn btn-outline-secondary btn-sm">Previous</a>
                        <a th:classappend="${currentPage + 1 >= totalPages} ? ' disabled' : ''" th:href="@{/books(page=${currentPage+1}, keyword=${keyword}, category=${selectedCategory}, sort=${sort})}" class="btn btn-outline-secondary btn-sm">Next</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
