<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Cửa hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bolder text-primary" href="/">
                <i class="bi bi-book me-2"></i>SÁCH HAY
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="p-5 mb-5 bg-primary bg-gradient text-white rounded-4 shadow">
            <h1 class="display-5 fw-bold">Khám phá tri thức mới</h1>
            <p class="col-md-8 fs-5">Tìm kiếm những cuốn sách bán chạy nhất và được yêu thích nhất trong tuần. Giảm giá lên đến 20% cho thành viên mới.</p>
            <a href="/books" class="btn btn-light btn-lg fw-bold rounded-pill mt-3">Xem bộ sưu tập</a>
        </div>
    </div>

    <div class="container mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 border-start border-primary border-4 ps-3">Sản Phẩm Phổ Biến</h3>
            <a href="/books" class="text-decoration-none text-primary fw-medium">Xem tất cả <i class="bi bi-chevron-right"></i></a>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            
            <div class="col" th:each="p : ${featured}">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative">
                    
                    <span class="position-absolute top-0 end-0 badge bg-danger m-3 py-2 px-3 rounded-pill shadow">Hot</span>
                    
                    <img th:src="${p.image}" class="card-img-top bg-white" style="height: 260px; object-fit: cover;" alt="Hình sản phẩm">
                    
                    <div class="card-body d-flex flex-column bg-white">
                        <h6 class="card-title fw-bold text-dark text-truncate mb-1" th:text="${p.title}">Tên Sách</h6>
                        <small class="text-muted mb-3" th:text="${p.author}">Tác giả</small>
                        
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="fs-5 fw-bold text-primary" th:text="${p.price} + ' đ'">Giá</span>
                        </div>
                    </div>

                    <div class="card-footer bg-white border-0 pb-3 pt-0">
                        <a th:href="@{/books}" class="btn btn-outline-primary w-100 fw-medium rounded-3">
                            Thêm vào giỏ
                        </a>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <footer class="py-4 bg-dark text-white-50 mt-5">
        <div class="container text-center">
            <small>&copy; 2026 Cửa hàng Sách. Chạy bằng Spring Boot & Bootstrap 5.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
