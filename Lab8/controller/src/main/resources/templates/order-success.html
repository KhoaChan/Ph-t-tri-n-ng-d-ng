<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card">
            <div class="card-body">
                <h4>Đặt hàng thành công - Mã đơn hàng: <span th:text="${order.id}"></span></h4>
                <p>Tên: <span th:text="${order.customerName}"></span></p>
                <p>Tổng tiền: <span th:text="${order.totalAmount} + ' VNĐ'"></span></p>
                <h5>Chi tiết đơn hàng</h5>
                <table class="table">
                    <thead>
                        <tr><th>Sản phẩm</th><th>Giá</th><th>Số lượng</th><th>Tổng</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${order.details}">
                            <td th:text="${d.title}"></td>
                            <td th:text="${d.price} + ' VNĐ'"></td>
                            <td th:text="${d.quantity}"></td>
                            <td th:text="${d.price * d.quantity} + ' VNĐ'"></td>
                        </tr>
                    </tbody>
                </table>
                <a href="/books" class="btn btn-primary">Quay lại cửa hàng</a>
            </div>
        </div>
    </div>
</body>
</html>
