<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h3>Giỏ hàng</h3>
        <form th:action="@{/cart/update}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Tổng</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.title}"></td>
                        <td th:text="${item.price} + ' VNĐ'"></td>
                        <td>
                            <input type="number" th:name="${'qty_' + item.bookId}" th:value="${item.quantity}" min="0" class="form-control" style="width:100px">
                        </td>
                        <td th:text="${item.total} + ' VNĐ'"></td>
                    </tr>
                </tbody>
            </table>
            <div class="d-flex justify-content-between">
                <div>
                    <a href="/books" class="btn btn-secondary">Tiếp tục mua</a>
                </div>
                <div>
                    <span class="me-3 fw-bold">Tổng: <span th:text="${total} + ' VNĐ'"></span></span>
                    <button class="btn btn-outline-primary">Cập nhật</button>
                </div>
            </div>
        </form>

        <div class="card mt-4">
            <div class="card-body">
                <form th:action="@{/cart/checkout}" method="post" class="row g-2" id="checkoutForm">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="col-md-6">
                        <input type="text" name="customerName" placeholder="Tên người nhận" class="form-control" required>
                    </div>
                </form>
                <div class="mt-3">
                    <button type="button" class="btn btn-primary" onclick="document.getElementById('checkoutForm').requestSubmit();">Thanh toán ngay</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
